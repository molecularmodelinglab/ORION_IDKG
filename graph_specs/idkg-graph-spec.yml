# testing graph spec
graphs:
  - graph_id: IDKG
    graph_name: Infectious Disease Knowledge Graph
    graph_description: 'A fake description for the testing baseline!'
    graph_url: 'http://localhost/fake_graph_url_for_tesing_baseline'
    conflation: True
    output_format: neo4j
    sources:
      - source_id: DrugCentral
      - source_id: SMACC
        strict_normalization: False
      - source_id: HeliSMACC
        strict_normalization: False
      - source_id: HVPPI
        strict_normalization: False
      - source_id: HVIDB
        strict_normalization: False
      - source_id: NPASS
        strict_normalization: False
      - source_id: ClinicalTrialsKP
      # New sources:
      - source_id: HGNC # For genes
      - source_id: PHAROS # Drug-target data
      - source_id: CTD # Chemical-Gene-disease
      - source_id: Reactome # Pathways
      # - source_id: textminingkp # may add later
      - source_id: STRING-DB-Human # Protein-Protein interactions
      # ROBOKOP sources with high priority:
      - source_id: BINDING-DB
      - source_id: DrugMechDB
      - source_id: MonarchKG
      - source_id: MONDOProps
      - source_id: OntologicalHierarchy
        merge_strategy: connected_edge_subset
      - source_id: BioGRID
        strict_normalization: False
      - source_id: PATHOPHENODB
        strict_normalization: False
        # source_version:
        # parsing_version:
        # node_normalization_version: latest
        # edge_normalization_version: latest
        # conflation: False
        # strict_normalization: True (whether or not data should be discarded when it can not be normalized)
        # merge_strategy: default (used to specify alternative merge strategies)